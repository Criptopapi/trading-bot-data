name: Descargar datos Binance

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  descargar:
    runs-on: ubuntu-latest
    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar descarga
        run: python descargar_datos_binance.py

      - name: Guardar resultados en el repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos_binance
          git commit -m "Actualiza datos historicos de Binance" || echo "Sin cambios para guardar"
          git push
